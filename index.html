<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ゴルフスコア計算</title>
    <style>
        :root {
            --green: #2d6a4f;
            --light-green: #52b788;
            --bg: #f0f7f4;
            --card: #ffffff;
            --text: #1b1b1b;
            --gray: #6b7280;
            --border: #e5e7eb;
            --red: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            padding-bottom: 40px;
        }
        .header {
            background: var(--green);
            color: white;
            padding: 16px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h1 { font-size: 18px; font-weight: 700; }
        .header p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
        .page { display: none; padding: 16px; }
        .page.active { display: block; }
        .card {
            background: var(--card);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .card h2 {
            font-size: 15px;
            color: var(--green);
            margin-bottom: 14px;
            font-weight: 700;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 8px;
        }
        .input-group { margin-bottom: 10px; }
        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--gray);
            margin-bottom: 4px;
            font-weight: 600;
        }
        .input-group input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input[type="text"]:focus { border-color: var(--light-green); }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: var(--green);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            margin-bottom: 10px;
            transition: opacity 0.15s;
        }
        .btn:active { opacity: 0.8; }
        .btn-outline {
            background: white;
            color: var(--green);
            border: 2px solid var(--green);
        }

        /* Par setup */
        .par-row {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .par-row:last-child { border-bottom: none; }
        .par-row-label {
            font-size: 14px;
            color: var(--gray);
            width: 80px;
            flex-shrink: 0;
        }
        .par-btns { display: flex; gap: 8px; }
        .par-btn {
            width: 44px;
            height: 36px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: var(--gray);
        }
        .par-btn.selected {
            background: var(--green);
            color: white;
            border-color: var(--green);
        }

        /* Scoring page */
        .hole-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 14px;
        }
        .hole-num { font-size: 36px; font-weight: 800; color: var(--green); line-height: 1; }
        .hole-num-label { font-size: 12px; color: var(--gray); }
        .hole-par-badge {
            background: var(--bg);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 15px;
            font-weight: 700;
            color: var(--green);
        }
        .pair-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 14px;
        }
        .pair-box {
            flex: 1;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            border: 1.5px solid var(--border);
            background: var(--bg);
        }
        .pair-box-label { font-size: 11px; color: var(--gray); margin-bottom: 3px; }
        .pair-box-names { font-size: 14px; font-weight: 700; color: var(--green); }
        .vs-label { font-size: 13px; font-weight: 800; color: var(--gray); flex-shrink: 0; }
        .score-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .score-item {
            background: var(--bg);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
        }
        .score-item-pair { font-size: 10px; color: var(--light-green); font-weight: 600; margin-bottom: 2px; }
        .score-item-name { font-size: 13px; color: var(--gray); margin-bottom: 8px; font-weight: 600; }
        .score-counter {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .cnt-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid var(--green);
            background: white;
            font-size: 22px;
            color: var(--green);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            line-height: 1;
        }
        .cnt-btn:active { background: var(--bg); }
        .cnt-val {
            font-size: 32px;
            font-weight: 800;
            min-width: 40px;
            text-align: center;
            line-height: 1;
        }
        .cnt-val.birdie { color: var(--light-green); }
        .cnt-val.eagle { color: #f59e0b; }
        .cnt-val.bogey { color: var(--gray); }
        .cnt-val.double { color: var(--red); }
        .score-label {
            font-size: 11px;
            margin-top: 4px;
            height: 16px;
            font-weight: 600;
        }

        /* Hole result */
        .result-banner {
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 14px;
            text-align: center;
            color: white;
        }
        .result-banner.win { background: var(--green); }
        .result-banner.draw { background: var(--gray); }
        .result-hole-label { font-size: 12px; opacity: 0.8; margin-bottom: 6px; }
        .result-winner-text { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
        .result-birdie-badge {
            display: inline-block;
            background: rgba(255,255,255,0.25);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            margin-bottom: 6px;
        }
        .result-points { font-size: 18px; font-weight: 700; }
        .score-compare {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .score-compare-box {
            flex: 1;
            text-align: center;
            padding: 12px 8px;
            border-radius: 10px;
            background: var(--bg);
        }
        .score-compare-box.winner-box { background: #d1fae5; }
        .score-compare-names { font-size: 11px; color: var(--gray); margin-bottom: 4px; }
        .score-compare-val { font-size: 28px; font-weight: 800; }
        .score-compare-val.win-val { color: var(--green); }
        .score-compare-arrow { font-size: 12px; color: var(--red); font-weight: 700; margin-top: 2px; }
        .score-compare-indiv { font-size: 11px; color: var(--gray); margin-top: 4px; }
        .ranking-row {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .ranking-row:last-child { border-bottom: none; }
        .rank-pos { font-size: 18px; font-weight: 800; width: 36px; color: var(--gray); }
        .rank-pos.first { color: #f59e0b; }
        .rank-name { flex: 1; font-size: 16px; font-weight: 600; }
        .rank-pts { font-size: 18px; font-weight: 700; color: var(--green); }
        .history-row {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }
        .history-row:last-child { border-bottom: none; }
        .history-hole { color: var(--gray); margin-bottom: 2px; }
        .history-result { font-weight: 600; }
    </style>
</head>
<body>

<div class="header">
    <h1>⛳ ゴルフスコア計算</h1>
    <p id="headerSub">プレイヤー設定</p>
</div>

<!-- ページ1: プレイヤー設定 -->
<div class="page active" id="page-setup">
    <div class="card">
        <h2>プレイヤー名を入力</h2>
        <div class="input-group">
            <label>プレイヤーA（1ホール目：ABペア）</label>
            <input type="text" id="nameA" placeholder="名前を入力">
        </div>
        <div class="input-group">
            <label>プレイヤーB（1ホール目：ABペア）</label>
            <input type="text" id="nameB" placeholder="名前を入力">
        </div>
        <div class="input-group">
            <label>プレイヤーC（1ホール目：CDペア）</label>
            <input type="text" id="nameC" placeholder="名前を入力">
        </div>
        <div class="input-group">
            <label>プレイヤーD（1ホール目：CDペア）</label>
            <input type="text" id="nameD" placeholder="名前を入力">
        </div>
    </div>
    <div class="card">
        <h2>ペア組み合わせ（自動ローテーション）</h2>
        <div style="font-size:13px;line-height:2;color:#374151;">
            <div>1・4・7・10・13・16ホール：<strong>AB vs CD</strong></div>
            <div>2・5・8・11・14・17ホール：<strong>BC vs AD</strong></div>
            <div>3・6・9・12・15・18ホール：<strong>AC vs BD</strong></div>
        </div>
    </div>
    <button class="btn" onclick="goToPars()">次へ：パー設定 →</button>
</div>

<!-- ページ2: パー設定 -->
<div class="page" id="page-pars">
    <div class="card">
        <h2>各ホールのパーを選択</h2>
        <div id="parList"></div>
    </div>
    <button class="btn" onclick="startGame()">ゲーム開始 →</button>
    <button class="btn btn-outline" onclick="goToPage('page-setup')">← 戻る</button>
</div>

<!-- ページ3: スコア入力 -->
<div class="page" id="page-scoring">
    <div class="card">
        <div class="hole-header">
            <div>
                <div class="hole-num-label">ホール</div>
                <div class="hole-num" id="dispHoleNum">1</div>
            </div>
            <div class="hole-par-badge" id="dispPar">Par 4</div>
        </div>
        <div class="pair-row" id="dispPairing"></div>
        <div class="score-grid" id="scoreGrid"></div>
    </div>
    <button class="btn" onclick="confirmHole()">このホールを確定 →</button>
</div>

<!-- ページ4: ホール結果 -->
<div class="page" id="page-hole-result">
    <div id="holeResultBody"></div>
    <button class="btn" id="btnNext" onclick="goNext()">次のホールへ →</button>
    <button class="btn btn-outline" onclick="backToScoring()">← スコアを修正する</button>
</div>

<!-- ページ5: 最終結果 -->
<div class="page" id="page-final">
    <div class="card">
        <h2>最終順位</h2>
        <div id="finalRanking"></div>
    </div>
    <div class="card">
        <h2>ホール別履歴</h2>
        <div id="holeHistory"></div>
    </div>
    <button class="btn" onclick="resetGame()">もう一度プレイ</button>
</div>

<script>
// ===== 状態管理 =====
const state = {
    players: ['A', 'B', 'C', 'D'],
    pars: Array(18).fill(4),
    scores: Array(18).fill(null).map(() => [0, 0, 0, 0]),
    points: [0, 0, 0, 0],
    currentHole: 0,
    holeResults: []
};

// ペア組み合わせ: [pair1[idx1, idx2], pair2[idx3, idx4]]
const PAIRINGS = [
    [[0, 1], [2, 3]], // AB vs CD
    [[1, 2], [0, 3]], // BC vs AD
    [[0, 2], [1, 3]], // AC vs BD
];

function getPairing(holeIdx) {
    return PAIRINGS[holeIdx % 3];
}

function pairScore(s1, s2) {
    return Math.min(s1, s2) * 10 + Math.max(s1, s2);
}

function reverseDigits(n) {
    const tens = Math.floor(n / 10);
    const ones = n % 10;
    return ones * 10 + tens;
}

function isBirdie(score, par) {
    return score <= par - 1;
}

function scoreLabel(score, par) {
    const diff = score - par;
    if (diff <= -2) return 'イーグル';
    if (diff === -1) return 'バーディ';
    if (diff === 0) return 'パー';
    if (diff === 1) return 'ボギー';
    if (diff === 2) return 'ダブルボギー';
    return `+${diff}`;
}

function scoreClass(score, par) {
    const diff = score - par;
    if (diff <= -2) return 'eagle';
    if (diff === -1) return 'birdie';
    if (diff === 1) return 'bogey';
    if (diff >= 2) return 'double';
    return '';
}

// ===== ページ遷移 =====
function goToPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
}

// ===== セットアップ → パー設定 =====
function goToPars() {
    state.players = ['nameA', 'nameB', 'nameC', 'nameD'].map((id, i) => {
        const v = document.getElementById(id).value.trim();
        return v || ['A', 'B', 'C', 'D'][i];
    });

    const list = document.getElementById('parList');
    list.innerHTML = '';
    for (let i = 0; i < 18; i++) {
        const row = document.createElement('div');
        row.className = 'par-row';
        row.innerHTML = `
            <span class="par-row-label">${i + 1}ホール目</span>
            <div class="par-btns">
                ${[3, 4, 5].map(p => `
                    <button class="par-btn ${state.pars[i] === p ? 'selected' : ''}"
                            onclick="setPar(${i}, ${p}, this)">${p}</button>
                `).join('')}
            </div>
        `;
        list.appendChild(row);
    }

    document.getElementById('headerSub').textContent = 'パー設定';
    goToPage('page-pars');
}

function setPar(holeIdx, par, btn) {
    state.pars[holeIdx] = par;
    btn.parentElement.querySelectorAll('.par-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
}

// ===== ゲーム開始 =====
function startGame() {
    state.points = [0, 0, 0, 0];
    state.scores = Array(18).fill(null).map(() => [0, 0, 0, 0]);
    state.holeResults = [];
    state.currentHole = 0;
    renderScoring();
    goToPage('page-scoring');
}

// ===== スコア入力画面 =====
function renderScoring() {
    const h = state.currentHole;
    const par = state.pars[h];
    const [[p1, p2], [p3, p4]] = getPairing(h);
    const playerOrder = [p1, p2, p3, p4];

    document.getElementById('dispHoleNum').textContent = h + 1;
    document.getElementById('dispPar').textContent = `Par ${par}`;
    document.getElementById('headerSub').textContent = `${h + 1} / 18ホール`;

    // ペア表示
    document.getElementById('dispPairing').innerHTML = `
        <div class="pair-box">
            <div class="pair-box-label">ペア1</div>
            <div class="pair-box-names">${state.players[p1]} & ${state.players[p2]}</div>
        </div>
        <div class="vs-label">VS</div>
        <div class="pair-box">
            <div class="pair-box-label">ペア2</div>
            <div class="pair-box-names">${state.players[p3]} & ${state.players[p4]}</div>
        </div>
    `;

    // スコア入力グリッド（ペア順に並べる）
    const pairLabel = {};
    pairLabel[p1] = `${state.players[p1]}・${state.players[p2]}組`;
    pairLabel[p2] = `${state.players[p1]}・${state.players[p2]}組`;
    pairLabel[p3] = `${state.players[p3]}・${state.players[p4]}組`;
    pairLabel[p4] = `${state.players[p3]}・${state.players[p4]}組`;

    document.getElementById('scoreGrid').innerHTML = playerOrder.map(pi => {
        const s = state.scores[h][pi] || par;
        state.scores[h][pi] = s;
        const cls = scoreClass(s, par);
        const lbl = scoreLabel(s, par);
        return `
            <div class="score-item">
                <div class="score-item-pair">${pairLabel[pi]}</div>
                <div class="score-item-name">${state.players[pi]}</div>
                <div class="score-counter">
                    <button class="cnt-btn" onclick="changeScore(${pi}, -1)">－</button>
                    <div class="cnt-val ${cls}" id="sv-${pi}">${s}</div>
                    <button class="cnt-btn" onclick="changeScore(${pi}, 1)">＋</button>
                </div>
                <div class="score-label" id="sl-${pi}" style="color:${cls==='birdie'?'#52b788':cls==='eagle'?'#f59e0b':cls==='double'?'#ef4444':'#9ca3af'}">${lbl}</div>
            </div>
        `;
    }).join('');
}

function changeScore(pi, delta) {
    const h = state.currentHole;
    const par = state.pars[h];
    const cur = state.scores[h][pi];
    const nv = Math.max(1, cur + delta);
    state.scores[h][pi] = nv;

    const cls = scoreClass(nv, par);
    const lbl = scoreLabel(nv, par);
    const el = document.getElementById(`sv-${pi}`);
    el.textContent = nv;
    el.className = `cnt-val ${cls}`;
    const lblEl = document.getElementById(`sl-${pi}`);
    lblEl.textContent = lbl;
    lblEl.style.color = cls === 'birdie' ? '#52b788' : cls === 'eagle' ? '#f59e0b' : cls === 'double' ? '#ef4444' : '#9ca3af';
}

// ===== ホール確定 =====
function confirmHole() {
    const h = state.currentHole;
    const par = state.pars[h];
    const [[p1, p2], [p3, p4]] = getPairing(h);
    const s = state.scores[h];

    // 前回のポイントを取り消す（修正時）
    const prev = state.holeResults[h];
    if (prev && prev.winner !== 0) {
        prev.winnerPlayers.forEach(pi => { state.points[pi] -= prev.pointsAwarded; });
    }

    const ps1 = pairScore(s[p1], s[p2]);
    const ps2 = pairScore(s[p3], s[p4]);

    const birdieP1 = isBirdie(s[p1], par) || isBirdie(s[p2], par);
    const birdieP2 = isBirdie(s[p3], par) || isBirdie(s[p4], par);

    const result = {
        hole: h + 1,
        par,
        scores: [...s],
        pair1: [p1, p2],
        pair2: [p3, p4],
        rawPs1: ps1,
        rawPs2: ps2,
        dispPs1: ps1,
        dispPs2: ps2,
        birdieBonus: false,
        winner: 0,
        winnerPlayers: [],
        pointsAwarded: 0
    };

    if (ps1 < ps2) {
        result.winner = 1;
        result.winnerPlayers = [p1, p2];
        let loser = ps2;
        if (birdieP1 && !birdieP2) {
            loser = reverseDigits(ps2);
            result.birdieBonus = true;
            result.dispPs2 = loser;
        }
        result.pointsAwarded = loser - ps1;
        state.points[p1] += result.pointsAwarded;
        state.points[p2] += result.pointsAwarded;
    } else if (ps2 < ps1) {
        result.winner = 2;
        result.winnerPlayers = [p3, p4];
        let loser = ps1;
        if (birdieP2 && !birdieP1) {
            loser = reverseDigits(ps1);
            result.birdieBonus = true;
            result.dispPs1 = loser;
        }
        result.pointsAwarded = loser - ps2;
        state.points[p3] += result.pointsAwarded;
        state.points[p4] += result.pointsAwarded;
    }

    state.holeResults[h] = result;
    renderHoleResult(result);
    document.getElementById('btnNext').textContent =
        h >= 17 ? '最終結果を見る' : `${h + 2}ホール目へ →`;
    goToPage('page-hole-result');
}

// ===== ホール結果表示 =====
function renderHoleResult(r) {
    const { hole, par, pair1, pair2, rawPs1, rawPs2, dispPs1, dispPs2, birdieBonus, winner, winnerPlayers, pointsAwarded, scores } = r;

    const p1names = pair1.map(i => state.players[i]).join(' & ');
    const p2names = pair2.map(i => state.players[i]).join(' & ');

    let bannerHtml = '';
    if (winner === 0) {
        bannerHtml = `
            <div class="result-banner draw">
                <div class="result-hole-label">${hole}ホール目 / Par ${par}</div>
                <div class="result-winner-text">引き分け</div>
            </div>`;
    } else {
        const wnames = winnerPlayers.map(i => state.players[i]).join(' & ');
        bannerHtml = `
            <div class="result-banner win">
                <div class="result-hole-label">${hole}ホール目 / Par ${par}</div>
                <div class="result-winner-text">${wnames} チームの勝利！</div>
                ${birdieBonus ? '<div class="result-birdie-badge">バーディボーナス適用！</div>' : ''}
                <div class="result-points">各自 +${pointsAwarded}ポイント</div>
            </div>`;
    }

    // スコア比較
    const isWin1 = winner === 1;
    const isWin2 = winner === 2;

    const arrow1 = birdieBonus && isWin2 ? `<div class="score-compare-arrow">${rawPs1} → ${dispPs1}</div>` : '';
    const arrow2 = birdieBonus && isWin1 ? `<div class="score-compare-arrow">${rawPs2} → ${dispPs2}</div>` : '';

    const indiv1 = pair1.map(i => `${state.players[i]}:${scores[i]}`).join(' / ');
    const indiv2 = pair2.map(i => `${state.players[i]}:${scores[i]}`).join(' / ');

    const compareHtml = `
        <div class="score-compare">
            <div class="score-compare-box ${isWin1 ? 'winner-box' : ''}">
                <div class="score-compare-names">${p1names}</div>
                <div class="score-compare-val ${isWin1 ? 'win-val' : ''}">${isWin2 && birdieBonus ? dispPs1 : rawPs1}</div>
                ${arrow1}
                <div class="score-compare-indiv">${indiv1}</div>
            </div>
            <div class="vs-label">VS</div>
            <div class="score-compare-box ${isWin2 ? 'winner-box' : ''}">
                <div class="score-compare-names">${p2names}</div>
                <div class="score-compare-val ${isWin2 ? 'win-val' : ''}">${isWin1 && birdieBonus ? dispPs2 : rawPs2}</div>
                ${arrow2}
                <div class="score-compare-indiv">${indiv2}</div>
            </div>
        </div>`;

    // 現在の順位
    const standings = state.players
        .map((name, i) => ({ name, pts: state.points[i] }))
        .sort((a, b) => b.pts - a.pts);

    const rankingHtml = standings.map((s, i) => `
        <div class="ranking-row">
            <div class="rank-pos ${i === 0 ? 'first' : ''}">${i + 1}</div>
            <div class="rank-name">${s.name}</div>
            <div class="rank-pts">${s.pts}pt</div>
        </div>
    `).join('');

    document.getElementById('holeResultBody').innerHTML = `
        ${bannerHtml}
        <div class="card">
            <h2>スコア詳細</h2>
            ${compareHtml}
        </div>
        <div class="card">
            <h2>現在の順位</h2>
            ${rankingHtml}
        </div>
    `;
}

// ===== 次のホールへ =====
function goNext() {
    if (state.currentHole >= 17) {
        showFinal();
    } else {
        state.currentHole++;
        renderScoring();
        goToPage('page-scoring');
    }
}

function backToScoring() {
    // 今のホールのポイントを取り消す
    const h = state.currentHole;
    const prev = state.holeResults[h];
    if (prev && prev.winner !== 0) {
        prev.winnerPlayers.forEach(pi => { state.points[pi] -= prev.pointsAwarded; });
        state.holeResults[h] = null;
    }
    goToPage('page-scoring');
}

// ===== 最終結果 =====
function showFinal() {
    document.getElementById('headerSub').textContent = '最終結果';

    const standings = state.players
        .map((name, i) => ({ name, pts: state.points[i] }))
        .sort((a, b) => b.pts - a.pts);

    const medals = ['🥇', '🥈', '🥉', '4位'];
    document.getElementById('finalRanking').innerHTML = standings.map((s, i) => `
        <div class="ranking-row">
            <div class="rank-pos ${i === 0 ? 'first' : ''}">${medals[i]}</div>
            <div class="rank-name">${s.name}</div>
            <div class="rank-pts">${s.pts}pt</div>
        </div>
    `).join('');

    document.getElementById('holeHistory').innerHTML = state.holeResults.map(r => {
        if (!r) return '';
        const p1n = r.pair1.map(i => state.players[i]).join('&');
        const p2n = r.pair2.map(i => state.players[i]).join('&');
        let res = '引き分け';
        if (r.winner !== 0) {
            const wn = r.winnerPlayers.map(i => state.players[i]).join('&');
            res = `${wn} +${r.pointsAwarded}pt${r.birdieBonus ? ' ★バーディ' : ''}`;
        }
        return `
            <div class="history-row">
                <div class="history-hole">${r.hole}H (Par${r.par})　${p1n}(${r.rawPs1}) vs ${p2n}(${r.rawPs2})</div>
                <div class="history-result">${res}</div>
            </div>
        `;
    }).join('');

    goToPage('page-final');
}

// ===== リセット =====
function resetGame() {
    state.points = [0, 0, 0, 0];
    state.scores = Array(18).fill(null).map(() => [0, 0, 0, 0]);
    state.holeResults = [];
    state.currentHole = 0;
    document.getElementById('headerSub').textContent = 'プレイヤー設定';
    goToPage('page-setup');
}
</script>
</body>
</html>
